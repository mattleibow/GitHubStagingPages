name: "Pages - Staging - Cleanup"

on:
  pull_request:
    branches: [ main ]
    types: [ closed ]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to clean up'
        required: true
        type: string
      pages_branch:
        description: 'Branch used to store the deployed pages content'
        required: false
        default: 'gh-pages'
        type: string

# Default to no permissions — each job declares only what it needs.
permissions: {}

# Each PR cleanup gets its own group, matching the deploy group for the same PR.
concurrency:
  group: "docs-deploy-pr-${{ github.event.number }}"
  cancel-in-progress: false

jobs:
  cleanup:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remove staging directory from pages branch
        env:
          PR_NUMBER: ${{ github.event.number || inputs.pr_number }}
          PAGES_BRANCH: ${{ inputs.pages_branch || 'gh-pages' }}
        run: |
          # Validate PR_NUMBER is a positive integer before using in paths
          if ! [[ "$PR_NUMBER" =~ ^[1-9][0-9]*$ ]]; then
            echo "Invalid PR number: $PR_NUMBER"
            exit 1
          fi

          # Switch to pages branch; exit cleanly if it doesn't exist yet
          if ! git fetch origin "$PAGES_BRANCH:$PAGES_BRANCH" 2>/dev/null; then
            echo "$PAGES_BRANCH branch does not exist, nothing to clean up"
            exit 0
          fi
          if ! git checkout "$PAGES_BRANCH" 2>/dev/null; then
            echo "Failed to checkout $PAGES_BRANCH, nothing to clean up"
            exit 0
          fi

          if [ -d "staging/$PR_NUMBER" ]; then
            rm -rf staging/$PR_NUMBER
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            git add -A
            if ! git diff --cached --quiet; then
              git commit -m "Remove staging site for PR #$PR_NUMBER"
              git push origin "$PAGES_BRANCH"
              echo "Removed staging directory for PR #$PR_NUMBER"
            else
              echo "No changes to commit for PR #$PR_NUMBER"
            fi
          else
            echo "No staging directory found for PR #$PR_NUMBER"
          fi

