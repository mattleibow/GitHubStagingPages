name: "Pages - Staging - Build and Deploy"

# ╔══════════════════════════════════════════════════════════════════════════╗
# ║ TEMPLATE GUIDE                                                           ║
# ║                                                                          ║
# ║ This workflow builds a multi-section site (landing page + Jekyll docs    ║
# ║ + Blazor WASM app), deploys it to a gh-pages branch, and supports        ║
# ║ per-PR staging previews.                                                 ║
# ║                                                                          ║
# ║ When copying this workflow, look for comments tagged with:               ║
# ║   [LANDING PAGE] — static landing page (site/ folder)                    ║
# ║   [DOCS]         — Jekyll documentation (docs/ folder)                   ║
# ║   [WASM APP]     — Blazor WebAssembly app (src/GreetingApp.Blazor)       ║
# ║   [STAGING]      — PR staging preview support                            ║
# ║   [PR COMMENT]   — bot comment with staging preview links                ║
# ║   [CORE]         — always keep: required for the workflow to function    ║
# ║                                                                          ║
# ║ Remove entire tagged sections you don't need. For example, if you        ║
# ║ don't have a Blazor app, remove all [WASM APP] sections.                 ║
# ╚══════════════════════════════════════════════════════════════════════════╝

on:
  # [CORE] Deploy when code lands on main
  push:
    branches: [ main ]
  # [STAGING] Build and deploy a staging preview for every PR
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened ]
  # [CORE] Allow manual re-deploy; optionally target a specific PR number
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to deploy as staging (leave blank to deploy to root)'
        required: false
        default: ''
        type: string
      dry_run:
        description: 'Dry run — build everything but do not deploy'
        required: false
        default: false
        type: boolean

# [CORE] Prevent duplicate builds for the same branch; cancel older PR runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# [CORE] Default to no permissions — each job declares only what it needs.
permissions: {}

env:
  # [CORE] Name of the branch used to serve the assembled site
  PAGES_BRANCH: gh-pages
  # [STAGING] Subdirectory in the pages branch where PR previews are stored
  STAGING_PATH: staging
  # [CORE] Base path for the site — derived from the repo name automatically
  SITE_BASE_PATH: /${{ github.event.repository.name }}
  # [CORE] Full base URL for the site — derived from the repo owner and name
  SITE_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
  # [CORE] Git identity used for automated commits to the pages branch
  GIT_COMMIT_EMAIL: action@github.com
  GIT_COMMIT_NAME: GitHub Action

jobs:
  # ══════════════════════════════════════════════════════════════════════════
  # BUILD — Assemble the complete site from all sections
  # ══════════════════════════════════════════════════════════════════════════
  build:
    name: Build Site
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      artifact_name: ${{ steps.vars.outputs.artifact_name }}
      is_staging: ${{ steps.vars.outputs.is_staging }}
      pr_number: ${{ steps.vars.outputs.pr_number }}
    steps:
      # [CORE] Determine whether this is a main deploy or a staging deploy,
      # and compute the correct base paths for each site section.
      - name: Setup build variables
        id: vars
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER_EVENT: ${{ github.event.number }}
          PR_NUMBER_INPUT: ${{ inputs.pr_number }}
        shell: bash
        run: |
          if [ "$EVENT_NAME" == "pull_request" ]; then
            PR_NUMBER="$PR_NUMBER_EVENT"
          elif [ "$EVENT_NAME" == "workflow_dispatch" ] && [ -n "$PR_NUMBER_INPUT" ]; then
            PR_NUMBER="$PR_NUMBER_INPUT"
          else
            PR_NUMBER=""
          fi

          if [ -n "$PR_NUMBER" ]; then
            # Validate PR_NUMBER is a positive integer
            if ! [[ "$PR_NUMBER" =~ ^[1-9][0-9]*$ ]]; then
              echo "Invalid PR number: $PR_NUMBER"
              exit 1
            fi
            echo "artifact_name=staging-site-${PR_NUMBER}" >> $GITHUB_OUTPUT
            # [WASM APP] Base href for the Blazor app under the staging path
            echo "app_base_href=${SITE_BASE_PATH}/${STAGING_PATH}/${PR_NUMBER}/app/" >> $GITHUB_OUTPUT
            # [DOCS] Base URL for Jekyll under the staging path
            echo "docs_base_url=${SITE_BASE_PATH}/${STAGING_PATH}/${PR_NUMBER}/docs" >> $GITHUB_OUTPUT
            echo "is_staging=true" >> $GITHUB_OUTPUT
            echo "pr_number=${PR_NUMBER}" >> $GITHUB_OUTPUT
            echo "source_label=PR #${PR_NUMBER}" >> $GITHUB_OUTPUT
          else
            echo "artifact_name=main-site" >> $GITHUB_OUTPUT
            # [WASM APP] Base href for the Blazor app at the root
            echo "app_base_href=${SITE_BASE_PATH}/app/" >> $GITHUB_OUTPUT
            # [DOCS] Base URL for Jekyll at the root
            echo "docs_base_url=${SITE_BASE_PATH}/docs" >> $GITHUB_OUTPUT
            echo "is_staging=false" >> $GITHUB_OUTPUT
            echo "pr_number=" >> $GITHUB_OUTPUT
            echo "source_label=main" >> $GITHUB_OUTPUT
          fi

      # [CORE] Check out the source code
      - name: Checkout
        uses: actions/checkout@v4

      # ── .NET setup ────────────────────────────────────────────────────────
      # [WASM APP] Required for building the Blazor WebAssembly app.
      # REMOVE this step if you don't have a Blazor/WASM app.
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # ── Ruby / Jekyll setup ───────────────────────────────────────────────
      # [DOCS] Required for building the Jekyll documentation site.
      # REMOVE this step if you don't have Jekyll docs.
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true
          working-directory: './docs'

      # ── Build Jekyll documentation ────────────────────────────────────────
      # [DOCS] Builds the Jekyll site from the docs/ folder.
      # The --baseurl flag ensures all links work at the correct deployment path.
      # REMOVE this step if you don't have Jekyll docs.
      - name: Build Jekyll docs
        env:
          JEKYLL_ENV: production
          DOCS_BASE_URL: ${{ steps.vars.outputs.docs_base_url }}
        run: |
          cd docs
          bundle exec jekyll build --baseurl "$DOCS_BASE_URL"

      # ── Build Blazor WASM app ─────────────────────────────────────────────
      # [WASM APP] Restore NuGet packages for the Blazor project.
      # REMOVE this step if you don't have a Blazor/WASM app.
      - name: Restore .NET dependencies
        run: dotnet restore src/GreetingApp.Blazor/GreetingApp.Blazor.csproj

      # [WASM APP] Publish the Blazor WASM app to a folder.
      # REMOVE this step if you don't have a Blazor/WASM app.
      - name: Publish Blazor WASM app
        env:
          SOURCE_LABEL: ${{ steps.vars.outputs.source_label }}
        run: |
          COMMIT_SHORT="${GITHUB_SHA:0:7}"
          dotnet publish src/GreetingApp.Blazor/GreetingApp.Blazor.csproj \
            -c Release \
            -o output/app-publish \
            --nologo

      # ── Assemble the final site from all built sections ───────────────────
      # [CORE] Combines all sections into a single site-out/ directory.
      # Edit this step to add or remove sections based on what you kept above.
      - name: Assemble site
        env:
          APP_BASE_HREF: ${{ steps.vars.outputs.app_base_href }}
          SOURCE_LABEL: ${{ steps.vars.outputs.source_label }}
        shell: bash
        run: |
          COMMIT_SHORT="${GITHUB_SHA:0:7}"
          BUILD_FOOTER="${SOURCE_LABEL} · ${COMMIT_SHORT}"

          mkdir -p site-out

          # [LANDING PAGE] Copy the static landing page files to the root.
          # REMOVE these lines if you don't have a landing page, or replace
          # with your own static files.
          cp site/index.html site-out/
          cp site/style.css site-out/
          cp site/404.html site-out/

          # [CORE] Tells GitHub Pages not to run Jekyll on the deployed branch
          # (needed so directories like _framework/ are served correctly).
          touch site-out/.nojekyll

          # [LANDING PAGE] Inject build info into the landing page footer.
          # REMOVE if you removed the landing page above.
          sed -i "s|Built with ❤️ using .NET and GitHub Actions.|Built with ❤️ using .NET and GitHub Actions. <small>(${BUILD_FOOTER})</small>|" site-out/index.html

          # [DOCS] Copy the built Jekyll site into the /docs/ subdirectory.
          # REMOVE if you removed the Jekyll docs build above.
          cp -r docs/_site site-out/docs

          # [WASM APP] Copy the published Blazor app into the /app/ subdirectory.
          # REMOVE if you removed the Blazor build above.
          cp -r output/app-publish/wwwroot site-out/app

          # [WASM APP] Rewrite the Blazor <base href> for the correct deployment path.
          # REMOVE if you removed the Blazor build above.
          sed -i "s|<base href=\"/\" />|<base href=\"$APP_BASE_HREF\" />|g" site-out/app/index.html

          echo "=== Site layout ==="
          find site-out -maxdepth 2 -type f | head -30
          echo "..."
          echo "Total files: $(find site-out -type f | wc -l)"

      # [CORE] Upload the assembled site so the deploy job can use it
      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.vars.outputs.artifact_name }}
          path: site-out
          retention-days: 1

  # ══════════════════════════════════════════════════════════════════════════
  # DEPLOY — Push the built site to the pages branch
  # ══════════════════════════════════════════════════════════════════════════
  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    # [CORE] Serialize deploys: main deploys serialize together, each PR gets
    # its own group. cancel-in-progress ensures newer commits win over older ones.
    concurrency:
      group: "docs-deploy-${{ needs.build.outputs.is_staging == 'true' && format('pr-{0}', needs.build.outputs.pr_number) || 'main' }}"
      cancel-in-progress: true
    # [CORE] Skip deploy on dry runs and fork PRs (forks can't push to this repo)
    if: |
      !inputs.dry_run &&
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    permissions:
      contents: write
    steps:
      # [CORE] Check out the pages branch (or create it if this is the first deploy)
      - name: Checkout pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REMOTE_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git init .
          git remote add origin "$REMOTE_URL"
          git config user.email "$GIT_COMMIT_EMAIL"
          git config user.name "$GIT_COMMIT_NAME"

          # Fetch pages branch if it exists; otherwise create an orphan branch
          if git fetch origin "$PAGES_BRANCH" 2>/dev/null; then
            git checkout -b "$PAGES_BRANCH" "origin/$PAGES_BRANCH"
          else
            echo "$PAGES_BRANCH branch does not exist, creating orphan branch"
            git checkout --orphan "$PAGES_BRANCH"
            git rm -rf . 2>/dev/null || true
            touch .nojekyll
            git add .nojekyll
            git commit -m "Initialize $PAGES_BRANCH branch"
            git push origin "$PAGES_BRANCH"
          fi

      # [CORE] Download the assembled site artifact from the build job
      - name: Download site artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: /tmp/site-temp

      # [CORE] Deploy to the root of the pages branch (runs on pushes to main).
      # Replaces all root content while preserving the staging/ directory so
      # existing PR previews are not destroyed.
      - name: Deploy main site content
        if: needs.build.outputs.is_staging == 'false'
        run: |
          # Remove everything except staging directory and .git/
          find . -maxdepth 1 \
              -not -name "$STAGING_PATH" \
              -not -name '.git' \
              -not -name '.' \
              -not -name '..' \
            -exec rm -rf {} \;
          cp -r /tmp/site-temp/. .
          rm -rf /tmp/site-temp

          # Ensure .nojekyll exists so _framework/ directories are served
          touch .nojekyll

          git add .
          if ! git diff --cached --quiet; then
            git commit -m "Deploy main site from commit ${{ github.sha }}"
            git push origin "$PAGES_BRANCH"
          else
            echo "No changes to commit"
          fi

      # [STAGING] Deploy to staging/{pr-number}/ for PR previews.
      # REMOVE this step if you don't want PR staging previews.
      - name: Deploy staging site content
        if: needs.build.outputs.is_staging == 'true'
        env:
          PR_NUMBER: ${{ needs.build.outputs.pr_number }}
        run: |
          # Validate PR_NUMBER is a positive integer before using in paths
          if ! [[ "$PR_NUMBER" =~ ^[1-9][0-9]*$ ]]; then
            echo "Invalid PR number: $PR_NUMBER"
            exit 1
          fi

          # Recreate the staging directory to ensure no stale files
          rm -rf "$STAGING_PATH/$PR_NUMBER"
          mkdir -p "$STAGING_PATH/$PR_NUMBER"
          cp -r /tmp/site-temp/. "$STAGING_PATH/$PR_NUMBER/"
          rm -rf /tmp/site-temp

          # Ensure .nojekyll exists at root so _framework is served
          touch .nojekyll

          git add .nojekyll "$STAGING_PATH/$PR_NUMBER"
          if ! git diff --cached --quiet; then
            git commit -m "Deploy staging site for PR #$PR_NUMBER"
            git push origin "$PAGES_BRANCH"
          else
            echo "No changes to commit"
          fi

  # ══════════════════════════════════════════════════════════════════════════
  # PR COMMENT — Post staging preview links on the pull request
  # ══════════════════════════════════════════════════════════════════════════
  # [PR COMMENT] Posts (or updates) a bot comment on the PR with direct links
  # to the staging preview. REMOVE this entire job if you removed staging
  # support or don't want automatic PR comments.
  comment:
    name: Comment on PR
    needs: [build, deploy]
    runs-on: ubuntu-latest
    if: |
      needs.build.outputs.is_staging == 'true' &&
      github.event_name == 'pull_request' &&
      (github.event.action == 'opened' || github.event.action == 'reopened' || github.event.action == 'synchronize')
    permissions:
      pull-requests: write
    steps:
      # [PR COMMENT] Create or update the bot comment with staging preview links.
      # Edit the URLs below to match the sections you kept (remove docs/app
      # links if you removed those sections).
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ needs.build.outputs.pr_number }};
            const stagingBase = `${process.env.SITE_BASE_URL}/${process.env.STAGING_PATH}/${prNumber}`;
            const stagingUrl = `${stagingBase}/`;
            // [DOCS] Remove the next line if you removed the Jekyll docs section
            const docsUrl = `${stagingBase}/docs/`;
            // [WASM APP] Remove the next line if you removed the Blazor app section
            const appUrl = `${stagingBase}/app/`;

            // Hidden marker to uniquely identify this workflow's comment
            const marker = '<!-- greetingapp-staging-preview -->';

            const commentBody = [
              marker,
              '🚀 **Staging Preview**',
              '',
              'This PR has been deployed to a staging environment:',
              '',
              `🔗 **[View Staging Site](${stagingUrl})**`,
              // [DOCS] Remove the next line if you removed the Jekyll docs section
              `📖 **[View Staging Docs](${docsUrl})**`,
              // [WASM APP] Remove the next line if you removed the Blazor app section
              `⚡ **[View Staging App](${appUrl})**`,
              '',
              'This preview is updated automatically when you push new commits.',
              '',
              '---',
              '*Automatically posted by the site deployment workflow.*'
            ].join('\n');

            // Find and update existing bot comment, or create a new one
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100
            });
            const botComment = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes(marker)
            );
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: commentBody
              });
            }
