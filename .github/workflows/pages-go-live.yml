name: "Pages - Go Live"

on:
  workflow_run:
    workflows:
      - "Pages - Staging - Build and Deploy"
      - "Pages - Staging - Cleanup"
    types:
      - completed
  workflow_dispatch:
    inputs:
      pages_branch:
        description: 'Branch used to store the deployed pages content'
        required: false
        default: 'gh-pages'
        type: string

# Default to no permissions — each job declares only what it needs.
permissions: {}

# Ensure go-live runs one at a time (latest wins)
concurrency:
  group: "docs-go-live"
  cancel-in-progress: true

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_repository.full_name == github.repository)
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pages branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.pages_branch || 'gh-pages' }}

      - name: Remove .git directory
        run: rm -rf .git

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
