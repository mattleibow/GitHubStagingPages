<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found — GreetingApp</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .error-section {
            text-align: center;
            padding: 4rem 0;
        }
        .error-code {
            font-size: 6rem;
            font-weight: 700;
            color: #512bd4;
            line-height: 1;
        }
        .error-message {
            font-size: 1.5rem;
            margin: 1rem 0 2rem;
            color: #555;
        }
        .back-link {
            display: inline-block;
            background: #512bd4;
            color: white;
            padding: 0.75rem 2rem;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.2s;
        }
        .back-link:hover {
            background: #3a1fa3;
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="container">
            <h1 class="site-title">GreetingApp</h1>
        </div>
    </header>

    <main class="container">
        <section class="error-section">
            <div class="error-code">404</div>
            <p class="error-message">Page not found</p>
            <a href="./" class="back-link">Go to Home</a>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>Built with ❤️ using .NET and GitHub Actions.</p>
        </div>
    </footer>
</body>
</html>
