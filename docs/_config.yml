# Site settings
title: GitHub Staging Pages
description: A guide to setting up multi-section sites with PR staging on GitHub Pages
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://mattleibow.github.io/GitHubStagingPages" # the base hostname & protocol for your site

# Jekyll settings
markdown: kramdown
highlighter: rouge
theme: minima

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap

# Build settings
exclude:
  - vendor/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - "*.gemspec"